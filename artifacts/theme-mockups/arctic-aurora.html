<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theme: Arctic Aurora</title>
    <style>
      :root {
        --bg-deep: #020814;
        --aurora-1: rgba(56, 189, 248, 0.15);
        --aurora-2: rgba(167, 139, 250, 0.2);
        --aurora-3: rgba(52, 211, 153, 0.12);
        --panel: linear-gradient(165deg, #0a1328 0%, #050c18 100%);
        --accent: #5eead4;
        --accent-2: #a78bfa;
        --text: #e0f2fe;
        --text-muted: rgba(224, 242, 254, 0.55);
        --border: rgba(94, 234, 212, 0.15);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-deep);
        color: var(--text);
        position: relative;
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 140%;
        height: 60%;
        left: -20%;
        pointer-events: none;
        z-index: 0;
        filter: blur(60px);
        opacity: 0.9;
      }
      body::before {
        top: -10%;
        background: radial-gradient(ellipse 80% 50% at 30% 20%, var(--aurora-1) 0%, transparent 50%),
          radial-gradient(ellipse 60% 40% at 70% 10%, var(--aurora-2) 0%, transparent 45%);
      }
      body::after {
        bottom: 20%;
        background: radial-gradient(ellipse 100% 60% at 50% 100%, var(--aurora-3) 0%, transparent 50%),
          linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.08) 50%, transparent);
      }
      .label {
        position: absolute;
        top: 20px;
        left: 24px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        z-index: 10;
      }
      .shell {
        position: relative;
        z-index: 1;
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 56px 24px 32px;
      }
      .top {
        height: 48px;
        border-radius: 4px 4px 0 0;
        background: var(--panel);
        border: 1px solid var(--border);
        border-bottom: none;
        box-shadow: 0 0 0 1px rgba(94, 234, 212, 0.08), 0 8px 32px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 8px;
      }
      .orb {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 12px var(--accent), 0 0 24px var(--accent-2);
        animation: pulse 3s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.8;
        }
        50% {
          opacity: 1;
          box-shadow: 0 0 16px var(--accent), 0 0 40px var(--accent-2);
        }
      }
      .title {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-muted);
      }
      .main {
        display: flex;
        flex: 1;
        min-height: 420px;
        border: 1px solid var(--border);
        border-radius: 0 0 4px 4px;
        overflow: hidden;
        background: rgba(2, 8, 20, 0.4);
        backdrop-filter: blur(1px);
      }
      .side {
        width: 200px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        padding: 16px 0;
        box-shadow: 4px 0 32px rgba(0, 0, 0, 0.25);
      }
      .nav-item {
        padding: 10px 20px;
        font-size: 13px;
        color: var(--text-muted);
        border-left: 3px solid transparent;
      }
      .nav-item.active {
        color: var(--text);
        background: linear-gradient(90deg, var(--aurora-1) 0%, transparent 100%);
        border-left-color: var(--accent);
      }
      .content {
        flex: 1;
        background: linear-gradient(180deg, #060d1c 0%, #020814 100%);
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .kpi {
        grid-column: 1 / -1;
        display: flex;
        gap: 12px;
      }
      .kpi-card {
        flex: 1;
        padding: 16px;
        border-radius: 4px;
        background: var(--panel);
        border: 1px solid var(--border);
      }
      .kpi-card h3 {
        margin: 0 0 6px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .kpi-value {
        font-size: 22px;
        font-weight: 600;
        color: var(--accent);
        text-shadow: 0 0 20px rgba(94, 234, 212, 0.3);
      }
      .chart {
        grid-column: 1 / -1;
        border-radius: 4px;
        border: 1px solid var(--border);
        min-height: 200px;
        background: var(--panel);
        position: relative;
        overflow: hidden;
      }
      .aurora-bands {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 0%,
          rgba(56, 189, 248, 0.08) 20%,
          rgba(167, 139, 250, 0.12) 50%,
          rgba(52, 211, 153, 0.07) 75%,
          transparent 100%
        );
        mask-image: linear-gradient(
          180deg,
          transparent 0%,
          black 30%,
          black 80%,
          transparent 100%
        );
        -webkit-mask-image: linear-gradient(
          180deg,
          transparent 0%,
          black 30%,
          black 80%,
          transparent 100%
        );
      }
      .grid {
        position: absolute;
        inset: 0;
        opacity: 0.2;
        background-image: linear-gradient(
            rgba(94, 234, 212, 0.1) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(94, 234, 212, 0.1) 1px, transparent 1px);
        background-size: 32px 32px;
      }
    </style>
  </head>
  <body>
    <p class="label">Theme concept · Arctic aurora</p>
    <div class="shell">
      <header class="top">
        <span class="orb" aria-hidden="true"></span>
        <span class="title">Polar night · dev</span>
      </header>
      <div class="main">
        <aside class="side">
          <div class="nav-item active">Dashboards</div>
          <div class="nav-item">Explore</div>
          <div class="nav-item">Alerting</div>
          <div class="nav-item">Configuration</div>
        </aside>
        <section class="content">
          <div class="kpi">
            <div class="kpi-card">
              <h3>Request rate</h3>
              <div class="kpi-value">22.0k/s</div>
            </div>
            <div class="kpi-card">
              <h3>Error budget</h3>
              <div class="kpi-value">99.5%</div>
            </div>
            <div class="kpi-card">
              <h3>P99 latency</h3>
              <div class="kpi-value">76ms</div>
            </div>
          </div>
          <div class="chart">
            <div class="aurora-bands"></div>
            <div class="grid"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>

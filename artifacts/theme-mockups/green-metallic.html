<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theme: Green Metallic</title>
    <style>
      :root {
        --bg-deep: #061a10;
        --bg-panel: linear-gradient(145deg, #0c2818 0%, #0a1f14 50%, #071510 100%);
        --metallic: linear-gradient(
          120deg,
          #1a4d2e 0%,
          #2d6b45 12%,
          #4a8f62 25%,
          #2d6b45 38%,
          #1a4d2e 50%,
          #0f3d25 62%,
          #3d7a52 75%,
          #1a4d2e 100%
        );
        --accent: #6ee7a8;
        --accent-dim: rgba(110, 231, 168, 0.35);
        --chrome: linear-gradient(180deg, #6b8c7a 0%, #3d5245 40%, #2a3d32 100%);
        --text: #e8f5ed;
        --text-muted: rgba(232, 245, 237, 0.55);
        --border: rgba(255, 255, 255, 0.12);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-deep);
        color: var(--text);
      }
      .label {
        position: absolute;
        top: 20px;
        left: 24px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        z-index: 10;
      }
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 56px 24px 32px;
      }
      .top {
        height: 48px;
        border-radius: 4px 4px 0 0;
        background: var(--metallic);
        border: 1px solid var(--border);
        border-bottom: none;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--chrome);
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
      }
      .title {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-muted);
      }
      .main {
        display: flex;
        flex: 1;
        min-height: 420px;
        border: 1px solid var(--border);
        border-radius: 0 0 4px 4px;
        overflow: hidden;
      }
      .side {
        width: 200px;
        background: var(--bg-panel);
        border-right: 1px solid var(--border);
        padding: 16px 0;
        box-shadow: inset -8px 0 24px rgba(0, 0, 0, 0.35);
      }
      .nav-item {
        padding: 10px 20px;
        font-size: 13px;
        color: var(--text-muted);
        border-left: 3px solid transparent;
      }
      .nav-item.active {
        color: var(--text);
        background: linear-gradient(90deg, var(--accent-dim) 0%, transparent 100%);
        border-left-color: var(--accent);
      }
      .content {
        flex: 1;
        background: linear-gradient(180deg, #0a1f14 0%, #061a10 100%);
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        gap: 16px;
      }
      .kpi {
        grid-column: 1 / -1;
        display: flex;
        gap: 12px;
      }
      .kpi-card {
        flex: 1;
        padding: 16px;
        border-radius: 4px;
        background: var(--metallic);
        border: 1px solid var(--border);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      }
      .kpi-card h3 {
        margin: 0 0 6px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .kpi-value {
        font-size: 22px;
        font-weight: 600;
        background: linear-gradient(90deg, #fff, var(--accent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .chart {
        grid-column: 1 / -1;
        border-radius: 4px;
        border: 1px solid var(--border);
        min-height: 200px;
        background: var(--bg-panel);
        position: relative;
        overflow: hidden;
      }
      .chart::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--accent-dim) 15%,
          rgba(46, 139, 87, 0.25) 50%,
          var(--accent-dim) 85%,
          transparent 100%
        );
        mask-image: linear-gradient(to top, black, transparent);
        -webkit-mask-image: linear-gradient(to top, black, transparent);
        pointer-events: none;
      }
      .chart-grid {
        position: absolute;
        inset: 0;
        background-image: linear-gradient(
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <p class="label">Theme concept · Green metallic</p>
    <div class="shell">
      <header class="top">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="title">Observability · production</span>
      </header>
      <div class="main">
        <aside class="side">
          <div class="nav-item active">Dashboards</div>
          <div class="nav-item">Explore</div>
          <div class="nav-item">Alerting</div>
          <div class="nav-item">Configuration</div>
        </aside>
        <section class="content">
          <div class="kpi">
            <div class="kpi-card">
              <h3>Request rate</h3>
              <div class="kpi-value">12.4k/s</div>
            </div>
            <div class="kpi-card">
              <h3>Error budget</h3>
              <div class="kpi-value">99.2%</div>
            </div>
            <div class="kpi-card">
              <h3>P99 latency</h3>
              <div class="kpi-value">142ms</div>
            </div>
          </div>
          <div class="chart">
            <div class="chart-grid"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>

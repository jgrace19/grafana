<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theme: Sunset</title>
    <style>
      :root {
        --bg: radial-gradient(ellipse 120% 80% at 50% 0%, #ff6b3d 0%, #c23d6e 45%, #4a1d68 100%);
        --panel: linear-gradient(160deg, rgba(30, 12, 40, 0.92) 0%, rgba(20, 8, 32, 0.96) 100%);
        --glow: rgba(255, 200, 140, 0.4);
        --accent: #ffc857;
        --accent-soft: rgba(255, 200, 87, 0.2);
        --text: #fff5eb;
        --text-muted: rgba(255, 245, 235, 0.6);
        --border: rgba(255, 255, 255, 0.18);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #1a0a20;
        background-image: var(--bg);
        background-attachment: fixed;
        color: var(--text);
      }
      .label {
        position: absolute;
        top: 20px;
        left: 24px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--text-muted);
        z-index: 10;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
      }
      .shell {
        max-width: 1200px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 56px 24px 32px;
      }
      .top {
        height: 48px;
        border-radius: 4px 4px 0 0;
        background: var(--panel);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-bottom: none;
        box-shadow: 0 0 40px var(--glow);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 10px;
      }
      .sun {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #ffe566 0%,
          #ff8c42 50%,
          #e84a5f 100%
        );
        box-shadow: 0 0 20px #ff8c42;
        margin-left: 4px;
      }
      .title {
        margin-left: auto;
        font-size: 12px;
        color: var(--text-muted);
      }
      .main {
        display: flex;
        flex: 1;
        min-height: 420px;
        border: 1px solid var(--border);
        border-radius: 0 0 4px 4px;
        overflow: hidden;
        box-shadow: 0 8px 48px rgba(0, 0, 0, 0.35);
      }
      .side {
        width: 200px;
        background: var(--panel);
        backdrop-filter: blur(6px);
        border-right: 1px solid var(--border);
        padding: 16px 0;
      }
      .nav-item {
        padding: 10px 20px;
        font-size: 13px;
        color: var(--text-muted);
        border-left: 3px solid transparent;
      }
      .nav-item.active {
        color: var(--text);
        background: var(--accent-soft);
        border-left-color: var(--accent);
        text-shadow: 0 0 12px rgba(255, 200, 87, 0.4);
      }
      .content {
        flex: 1;
        background: linear-gradient(
          180deg,
          rgba(12, 6, 20, 0.85) 0%,
          rgba(8, 4, 16, 0.92) 100%
        );
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .kpi {
        grid-column: 1 / -1;
        display: flex;
        gap: 12px;
      }
      .kpi-card {
        flex: 1;
        padding: 16px;
        border-radius: 4px;
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      }
      .kpi-card h3 {
        margin: 0 0 6px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .kpi-value {
        font-size: 22px;
        font-weight: 600;
        color: var(--accent);
      }
      .chart {
        grid-column: 1 / -1;
        border-radius: 4px;
        border: 1px solid var(--border);
        min-height: 200px;
        background: var(--panel);
        position: relative;
        overflow: hidden;
      }
      .chart-horizon {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 35%;
        height: 4px;
        background: linear-gradient(90deg, #ff5e62, #ff9966, #c23d6e, #4a1d68);
        opacity: 0.7;
        filter: blur(2px);
      }
      .chart::before {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 55%;
        background: linear-gradient(
          180deg,
          transparent 0%,
          rgba(255, 120, 80, 0.12) 40%,
          rgba(194, 61, 110, 0.2) 100%
        );
        border-radius: 0 0 2px 2px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <p class="label">Theme concept · Sunset</p>
    <div class="shell">
      <header class="top">
        <span class="sun" aria-hidden="true"></span>
        <span class="title">Golden hour · staging</span>
      </header>
      <div class="main">
        <aside class="side">
          <div class="nav-item active">Dashboards</div>
          <div class="nav-item">Explore</div>
          <div class="nav-item">Alerting</div>
          <div class="nav-item">Configuration</div>
        </aside>
        <section class="content">
          <div class="kpi">
            <div class="kpi-card">
              <h3>Request rate</h3>
              <div class="kpi-value">8.1k/s</div>
            </div>
            <div class="kpi-card">
              <h3>Error budget</h3>
              <div class="kpi-value">99.7%</div>
            </div>
            <div class="kpi-card">
              <h3>P99 latency</h3>
              <div class="kpi-value">98ms</div>
            </div>
          </div>
          <div class="chart">
            <div class="chart-horizon"></div>
          </div>
        </section>
      </div>
    </div>
  </body>
</html>
